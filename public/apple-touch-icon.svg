<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none">
  <!-- Background -->
  <rect width="180" height="180" rx="36" fill="#0B0F1A"/>
  
  <!-- Chart grid pattern -->
  <defs>
    <linearGradient id="chartGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FFB2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Chart line going up (profit) -->
  <path 
    d="M20 130 L55 110 L75 120 L110 75 L130 85 L160 40" 
    stroke="url(#chartGradient)" 
    stroke-width="8" 
    stroke-linecap="round" 
    stroke-linejoin="round"
    fill="none"
    filter="url(#glow)"
  />
  
  <!-- Candlestick bars -->
  <rect x="30" y="100" width="12" height="35" rx="3" fill="#00FFB2"/>
  <rect x="60" y="85" width="12" height="45" rx="3" fill="#3B82F6"/>
  <rect x="90" y="70" width="12" height="55" rx="3" fill="#00FFB2"/>
  <rect x="120" y="50" width="12" height="45" rx="3" fill="#3B82F6"/>
  <rect x="150" y="30" width="12" height="55" rx="3" fill="#00FFB2"/>
  
  <!-- Arrow pointing up -->
  <path 
    d="M130 28 L140 18 L150 28" 
    stroke="#00FFB2" 
    stroke-width="6" 
    stroke-linecap="round" 
    stroke-linejoin="round"
    fill="none"
  />
</svg>