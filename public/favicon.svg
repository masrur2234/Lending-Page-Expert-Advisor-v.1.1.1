<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0B0F1A"/>
  
  <!-- Chart grid pattern -->
  <defs>
    <linearGradient id="chartGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FFB2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Chart line going up (profit) -->
  <path 
    d="M8 48 L20 40 L28 44 L40 28 L48 32 L56 16" 
    stroke="url(#chartGradient)" 
    stroke-width="4" 
    stroke-linecap="round" 
    stroke-linejoin="round"
    fill="none"
    filter="url(#glow)"
  />
  
  <!-- Candlestick bars -->
  <rect x="12" y="38" width="4" height="12" rx="1" fill="#00FFB2"/>
  <rect x="22" y="32" width="4" height="16" rx="1" fill="#3B82F6"/>
  <rect x="32" y="28" width="4" height="20" rx="1" fill="#00FFB2"/>
  <rect x="42" y="20" width="4" height="16" rx="1" fill="#3B82F6"/>
  <rect x="52" y="12" width="4" height="20" rx="1" fill="#00FFB2"/>
  
  <!-- Arrow pointing up -->
  <path 
    d="M48 10 L52 6 L56 10" 
    stroke="#00FFB2" 
    stroke-width="2.5" 
    stroke-linecap="round" 
    stroke-linejoin="round"
    fill="none"
  />
</svg>